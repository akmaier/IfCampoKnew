name: Weekly Campo scrape

# Mondays 03:00 UTC = 04:00 CET / 05:00 CEST.
# Off-peak for Campo; gives the workweek a fresh corpus by Monday morning.
# Manual run via the Actions tab is also supported.
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      period_id:
        description: "Campo periodId (default 589 = SoSe 2026)"
        required: false
        default: "589"
      prior_period_id:
        description: "Optional adjacent period (default 565 = WiSe 2025/26). The Pflicht-Analyse uses both terms for full-year coverage. Empty = skip."
        required: false
        default: "565"
      max_depth:
        description: "Tree-walk max depth (6 = courses inside Studiengänge; 4 = only PO stubs + buckets; 0 = unlimited, hard cap 12)"
        required: false
        default: "6"
      with_courses:
        description: "Also fetch course-detail pages (true/false)"
        required: false
        default: "true"

permissions:
  contents: write  # for committing data/ + creating Releases

concurrency:
  group: scrape-${{ github.ref }}
  cancel-in-progress: false  # never interrupt an in-flight scrape

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # generous; depth-0 + courses can run for hours
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scraper/requirements.txt

      - name: Resolve inputs
        id: vars
        run: |
          echo "period_id=${{ github.event.inputs.period_id || '589' }}" >> "$GITHUB_OUTPUT"
          echo "prior_period_id=${{ github.event.inputs.prior_period_id || '565' }}" >> "$GITHUB_OUTPUT"
          echo "max_depth=${{ github.event.inputs.max_depth || '6' }}"   >> "$GITHUB_OUTPUT"
          echo "with_courses=${{ github.event.inputs.with_courses || 'true' }}" >> "$GITHUB_OUTPUT"
          echo "iso_week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"
          echo "iso_month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Walk catalogue tree
        # Walker is single-session; the rate probe (Entry 0016) shows
        # interval=0.2s = ~1.4 req/s effective ceiling (latency-bound).
        # Default 1.0s would triple wall-clock for the depth-6 walk.
        run: |
          mkdir -p tmp
          python scraper/scrape.py \
            --period ${{ steps.vars.outputs.period_id }} \
            --out tmp/${{ steps.vars.outputs.period_id }}.json \
            --max-depth ${{ steps.vars.outputs.max_depth }} \
            --interval 0.2 \
            --checkpoint-every 100 \
            -v

      - name: Fetch course detail pages (catalogue)
        if: steps.vars.outputs.with_courses == 'true'
        # parallel=2 + interval=0.2s ≈ 2.7 req/s aggregate. Per the
        # 2026-05-03 rate probe: doubles throughput vs --interval 0.5
        # at the same p95 latency, no backend contention. See devlog
        # entry 0016 for the calibration.
        run: |
          python scraper/fetch_courses.py \
            --in tmp/${{ steps.vars.outputs.period_id }}.json \
            --out tmp/${{ steps.vars.outputs.period_id }}-courses.json \
            --parallel 2 \
            --interval 0.2 \
            --save-every 50 \
            -v

      - name: Sweep Tagesaktuelle Veranstaltungen for the semester
        if: steps.vars.outputs.with_courses == 'true'
        run: |
          python scraper/scrape_tagesaktuelle.py \
            --period ${{ steps.vars.outputs.period_id }} \
            --out tmp/${{ steps.vars.outputs.period_id }}-tagesaktuelle.json \
            --interval 0.5 \
            -v
        continue-on-error: true

      - name: Fetch additional course details from sweep
        if: steps.vars.outputs.with_courses == 'true' && hashFiles(format('tmp/{0}-tagesaktuelle.json', steps.vars.outputs.period_id)) != ''
        run: |
          python scraper/fetch_courses.py \
            --in tmp/${{ steps.vars.outputs.period_id }}-tagesaktuelle.json \
            --out tmp/${{ steps.vars.outputs.period_id }}-courses.json \
            --resume \
            --parallel 2 \
            --interval 0.2 \
            --save-every 50 \
            -v

      # ── Prior-period steps ──────────────────────────────────────────────
      # The Pflicht-Analyse needs both terms of an academic year (Entry
      # 0019 in devlog.md): many Pflicht-Vorlesungen run only in WiSe
      # (Analysis I, Programmierung, Anatomie, …) and would be invisible
      # if we only scrape the current term. All prior-period steps use
      # `continue-on-error: true` so a transient failure on the prior
      # term never blocks the main scrape.
      #
      # The 2026-05-04 cron timed out at GitHub Actions' 6-hour cap with
      # depth-6 walks for both periods. Fix: cache the prior-period
      # snapshots and refresh only monthly. The prior period (WiSe in
      # the SoSe-cron case, etc.) has finished/is finishing — its data
      # changes far less than the current term's. On a cache hit (most
      # weeks) the four prior-period scrape steps below all skip.

      - name: Restore prior-period cache (monthly key)
        if: steps.vars.outputs.prior_period_id != ''
        id: cache_prior
        uses: actions/cache@v4
        with:
          path: |
            tmp/${{ steps.vars.outputs.prior_period_id }}.json
            tmp/${{ steps.vars.outputs.prior_period_id }}-courses.json
            tmp/${{ steps.vars.outputs.prior_period_id }}-tagesaktuelle.json
          key: campo-prior-${{ steps.vars.outputs.prior_period_id }}-d${{ steps.vars.outputs.max_depth }}-${{ steps.vars.outputs.iso_month }}
          # Fall back to ANY cached snapshot for this period+depth if the
          # current month's key misses (e.g. very first run of a month).
          # Even a slightly-stale prior-period snapshot is better than
          # re-walking 5 000+ unit_ids in a 6-hour budget.
          restore-keys: |
            campo-prior-${{ steps.vars.outputs.prior_period_id }}-d${{ steps.vars.outputs.max_depth }}-

      - name: Walk prior period catalogue
        if: steps.vars.outputs.prior_period_id != '' && steps.cache_prior.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          python scraper/scrape.py \
            --period ${{ steps.vars.outputs.prior_period_id }} \
            --out tmp/${{ steps.vars.outputs.prior_period_id }}.json \
            --max-depth ${{ steps.vars.outputs.max_depth }} \
            --interval 0.2 \
            --checkpoint-every 100 \
            -v

      - name: Fetch prior-period course details
        if: steps.vars.outputs.prior_period_id != '' && steps.vars.outputs.with_courses == 'true' && steps.cache_prior.outputs.cache-hit != 'true' && hashFiles(format('tmp/{0}.json', steps.vars.outputs.prior_period_id)) != ''
        continue-on-error: true
        run: |
          python scraper/fetch_courses.py \
            --in tmp/${{ steps.vars.outputs.prior_period_id }}.json \
            --out tmp/${{ steps.vars.outputs.prior_period_id }}-courses.json \
            --parallel 2 \
            --interval 0.2 \
            --save-every 50 \
            -v

      - name: Sweep Tagesaktuelle for prior period
        if: steps.vars.outputs.prior_period_id != '' && steps.vars.outputs.with_courses == 'true' && steps.cache_prior.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          python scraper/scrape_tagesaktuelle.py \
            --period ${{ steps.vars.outputs.prior_period_id }} \
            --out tmp/${{ steps.vars.outputs.prior_period_id }}-tagesaktuelle.json \
            --interval 0.5 \
            -v

      - name: Fetch additional prior-period courses from sweep
        if: steps.vars.outputs.prior_period_id != '' && steps.vars.outputs.with_courses == 'true' && steps.cache_prior.outputs.cache-hit != 'true' && hashFiles(format('tmp/{0}-tagesaktuelle.json', steps.vars.outputs.prior_period_id)) != ''
        continue-on-error: true
        run: |
          python scraper/fetch_courses.py \
            --in tmp/${{ steps.vars.outputs.prior_period_id }}-tagesaktuelle.json \
            --out tmp/${{ steps.vars.outputs.prior_period_id }}-courses.json \
            --resume \
            --parallel 2 \
            --interval 0.2 \
            --save-every 50 \
            -v

      - name: Render markdown corpus
        run: |
          if [ -f "tmp/${{ steps.vars.outputs.period_id }}-courses.json" ]; then
            python scraper/render_markdown.py \
              --in tmp/${{ steps.vars.outputs.period_id }}.json \
              --courses tmp/${{ steps.vars.outputs.period_id }}-courses.json \
              --out data
          else
            python scraper/render_markdown.py \
              --in tmp/${{ steps.vars.outputs.period_id }}.json \
              --out data
          fi

      - name: Render prior-period markdown corpus
        # Without this, the Pflicht-Analyse's "Campo-Studiengang"
        # links into ../{prior-period-slug}/… would resolve to nothing.
        if: steps.vars.outputs.prior_period_id != '' && hashFiles(format('tmp/{0}.json', steps.vars.outputs.prior_period_id)) != ''
        continue-on-error: true
        run: |
          if [ -f "tmp/${{ steps.vars.outputs.prior_period_id }}-courses.json" ]; then
            python scraper/render_markdown.py \
              --in tmp/${{ steps.vars.outputs.prior_period_id }}.json \
              --courses tmp/${{ steps.vars.outputs.prior_period_id }}-courses.json \
              --out data
          else
            python scraper/render_markdown.py \
              --in tmp/${{ steps.vars.outputs.prior_period_id }}.json \
              --out data
          fi

      - name: Aggregate Lehrende-Index aus Campo (people)
        # Includes prior-period inputs when available so the index covers
        # the full academic year (Profs who only teach WiSe wouldn't show
        # up in a SoSe-only index).
        if: hashFiles(format('tmp/{0}-courses.json', steps.vars.outputs.period_id)) != ''
        run: |
          INPUTS="tmp/${{ steps.vars.outputs.period_id }}.json tmp/${{ steps.vars.outputs.period_id }}-courses.json"
          if [ -n "${{ steps.vars.outputs.prior_period_id }}" ]; then
            for f in tmp/${{ steps.vars.outputs.prior_period_id }}.json tmp/${{ steps.vars.outputs.prior_period_id }}-courses.json; do
              [ -f "$f" ] && INPUTS="$INPUTS $f"
            done
          fi
          echo "people_index inputs: $INPUTS"
          python scraper/people_index.py \
            --inputs $INPUTS \
            --out data/personen \
            -v

      - name: Pull FAUdir Professor:innen-Index (für Pflicht-Cross-Ref)
        run: |
          python scraper/faudir_scrape.py \
            --out data/personen/faudir-INDEX.md \
            --interval 0.5 \
            -v
        continue-on-error: true  # if FAUdir is down, the analyze still runs without it

      - name: Heuristische Pflicht-Analyse + W-Profs-Cross-Ref
        if: hashFiles(format('tmp/{0}-courses.json', steps.vars.outputs.period_id)) != ''
        # When prior-period data is on disk, pass BOTH periods to the
        # analyser. analyze_pflicht.py auto-derives periodId from each
        # tree JSON so --period is no longer required (Entry 0017).
        run: |
          PRIOR_TREE="tmp/${{ steps.vars.outputs.prior_period_id }}.json"
          PRIOR_COURSES="tmp/${{ steps.vars.outputs.prior_period_id }}-courses.json"
          if [ -n "${{ steps.vars.outputs.prior_period_id }}" ] && [ -f "$PRIOR_TREE" ] && [ -f "$PRIOR_COURSES" ]; then
            echo "Running Pflicht-Analyse with both periods (current + prior)"
            python scraper/analyze_pflicht.py \
              --data data \
              --tree "$PRIOR_TREE" tmp/${{ steps.vars.outputs.period_id }}.json \
              --courses "$PRIOR_COURSES" tmp/${{ steps.vars.outputs.period_id }}-courses.json \
              --out data/analyse/pflichtveranstaltungen.md \
              -v
          else
            echo "Prior-period data not present — single-period analyse"
            python scraper/analyze_pflicht.py \
              --data data \
              --tree tmp/${{ steps.vars.outputs.period_id }}.json \
              --courses tmp/${{ steps.vars.outputs.period_id }}-courses.json \
              --out data/analyse/pflichtveranstaltungen.md \
              -v
          fi

      - name: Strukturierte Pflichtmodul-Extraktion aus PO-Anlagen
        run: |
          python scraper/extract_pflicht_module.py \
            --data data \
            --out data/analyse/pflichtmodule.md \
            -v

      - name: Commit corpus changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No corpus changes — skipping commit and release."
          else
            git commit -m "Weekly scrape: ${{ steps.vars.outputs.iso_week }} (period ${{ steps.vars.outputs.period_id }})"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build corpus zip
        if: steps.commit.outputs.changed == 'true'
        id: zip
        run: |
          cd data
          ZIP_NAME="ifcampoknew-corpus-${{ steps.vars.outputs.iso_week }}.zip"
          # archive the whole corpus so a downloader gets one self-contained file
          zip -r -q "../$ZIP_NAME" .
          cd ..
          echo "name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "size=$(du -h "$ZIP_NAME" | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cut a Release with the corpus zip + JSON intermediates
        if: steps.commit.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: snapshot-${{ steps.vars.outputs.iso_week }}
          name: Snapshot ${{ steps.vars.outputs.iso_week }} (period ${{ steps.vars.outputs.period_id }})
          body: |
            Automated weekly scrape of Campo.

            * periodId: ${{ steps.vars.outputs.period_id }}
            * tree max-depth: ${{ steps.vars.outputs.max_depth }}
            * with course details: ${{ steps.vars.outputs.with_courses }}
            * corpus zip: ${{ steps.zip.outputs.name }} (${{ steps.zip.outputs.size }})

            Download `${{ steps.zip.outputs.name }}` for a self-contained,
            RAG-ready markdown corpus. Start with `README.md` inside the zip.
          files: |
            ${{ steps.zip.outputs.name }}
            tmp/${{ steps.vars.outputs.period_id }}.json
            tmp/${{ steps.vars.outputs.period_id }}-courses.json
            tmp/${{ steps.vars.outputs.prior_period_id }}.json
            tmp/${{ steps.vars.outputs.prior_period_id }}-courses.json
          fail_on_unmatched_files: false
